name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    backend:
        name: Backend — type-check & lint
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: backend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Type-check
              run: npx tsc --noEmit

            - name: Build
              run: npm run build

    frontend:
        name: Frontend — type-check & build
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Type-check
              run: npm run type-check

            - name: Build
              env:
                  VITE_API_URL: /api
                  VITE_STRIPE_PUBLIC_KEY: pk_test_placeholder
              run: npm run build
